<style>
  /* Base lock overlay styling, fits the NovaPlay theme */
  #domain-lock-overlay {
      position: fixed; inset: 0;
      background: rgba(5, 5, 7, 0.95);
      backdrop-filter: blur(15px);
      z-index: 99999;
      display: none; /* Hidden by default, JS handles it */
      align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #f3f3f8;
  }
  .lock-box {
      background: #101014; border: 1px solid #22222c;
      border-radius: 24px; padding: 32px; width: 90%; max-width: 400px;
      text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .lock-box h2 { color: #8b5cf6; margin-bottom: 12px; font-weight: 800; }
  .lock-box p { color: #9494a0; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .lock-input {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #22222c;
      background: #18181f; color: #fff; font-size: 14px; text-align: center;
      margin-bottom: 16px; outline: none; transition: border-color 0.2s;
  }
  .lock-input:focus { border-color: #8b5cf6; }
  .lock-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: #8b5cf6; color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: background 0.2s;
  }
  .lock-btn:hover { background: #7c3aed; }
  .lock-error { color: #f43f5e; font-size: 13px; font-weight: 600; margin-top: 12px; min-height: 18px; }
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      const officialDomain = "akshat-881236.github.io";
      const officialURL = "https://akshat-881236.github.io/HorizonTechX_NovaPlaySuite/";
      const redirectURL = "https://akshat-881236.github.io/HorizonTechX_NovaPlaySuite/403.html"
      
      const currentHost = window.location.hostname;
      const isIframe = window.self !== window.top;
      
      // Allow localhost for your own local development testing
      const isAuthorizedEnv = (currentHost === officialDomain || currentHost === "localhost" || currentHost === "127.0.0.1") && !isIframe;

      // Extract AppCodes from meta tags
      const validCodes = [
          document.querySelector('meta[name="AppCode-1"]')?.content,
          document.querySelector('meta[name="AppCode-2"]')?.content,
          document.querySelector('meta[name="AppCode-3"]')?.content,
          document.querySelector('meta[name="AppCode-4"]')?.content
      ].filter(Boolean);

      const injectMainScript = () => {
          const script = document.createElement('script');
          script.src = 'other_domain.js'; // Your external script file
          document.body.appendChild(script);
      };

      if (isAuthorizedEnv) {
          // Normal execution on authorized domain
          injectMainScript();
      } else {
          // Unauthorized domain or Iframe detected: Block UI
          const overlay = document.createElement('div');
          overlay.id = 'domain-lock-overlay';
          overlay.innerHTML = `
              <div class="lock-box">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" style="margin-bottom:16px;">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                  <h2>Access Restricted</h2>
                  <p>This instance of NovaPlay Suite is being hosted outside of the Akshat Network Hub. Please enter a valid Web Access Code to proceed.</p>
                  <input type="password" id="app-code-input" class="lock-input" placeholder="Enter Web Access Code" autocomplete="off"/>
                  <button id="app-code-submit" class="lock-btn">Unlock NovaPlay</button>
                  <div id="app-code-error" class="lock-error"></div>
              </div>
          `;
          document.body.appendChild(overlay);
          overlay.style.display = 'flex';

          let attempts = 0;
          const maxAttempts = 3;
          const submitBtn = overlay.querySelector('#app-code-submit');
          const inputField = overlay.querySelector('#app-code-input');
          const errorMsg = overlay.querySelector('#app-code-error');

          const verifyCode = () => {
              const userCode = inputField.value.trim();
              if (validCodes.includes(userCode)) {
                  overlay.style.display = 'none';
                  injectMainScript();
              } else {
                  attempts++;
                  if (attempts >= maxAttempts) {
                      errorMsg.textContent = "Maximum attempts reached. Redirecting...";
                      setTimeout(() => { window.top.location.href = redirectURL; }, 1500);
                  } else {
                      errorMsg.textContent = `Invalid code. ${maxAttempts - attempts} attempt(s) remaining.`;
                      inputField.value = '';
                  }
              }
          };

          submitBtn.addEventListener('click', verifyCode);
          inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyCode(); });
      }
  });
</script>
