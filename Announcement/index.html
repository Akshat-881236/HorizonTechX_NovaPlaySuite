    <style>
        /* ==========================================================================
         * 1. NOVAPLAY DESIGN SYSTEM VARIABLES
         * ========================================================================== */
        :root {
            --void-black: #050507;
            --surface-base: #101014;
            --surface-card: #18181f;
            --surface-hover: #24242e;
            --text-main: #f3f3f8;
            --text-sub: #9494a0;
            --border-line: #22222c;
            --violet-glow: #8b5cf6;
            --rose-alert: #f43f5e;
            --emerald-ok: #10b981;
            --snappy: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--void-black);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ==========================================================================
         * 2. PAGE LAYOUT & EMBED CONTAINER
         * ========================================================================== */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.5s var(--snappy);
        }
        
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.2);
            color: var(--violet-glow); padding: 6px 14px; border-radius: 8px;
            font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 16px;
        }

        .page-header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .page-header p { color: var(--text-sub); font-size: 15px; }

        .embed-wrapper {
            position: relative;
            width: 100%;
            max-width: 504px; /* Matches LinkedIn's native width */
            background: var(--surface-base);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
            overflow: hidden;
            min-height: 400px;
            animation: fadeIn 0.8s ease;
        }

        /* Responsive iframe handling */
        .embed-wrapper iframe {
            width: 100% !important;
            display: block;
            border: none;
            position: relative;
            z-index: 10;
            background: #ffffff; /* LinkedIn posts are white, this prevents dark gaps */
        }

        /* Loading Skeleton */
        .loader-state {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
            z-index: 5; color: var(--text-sub);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--surface-hover);
            border-top-color: var(--violet-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Actions */
        .actions {
            margin-top: 32px;
            display: flex; gap: 16px;
        }
        .glass-btn {
            padding: 12px 24px; border-radius: 12px; border: 1px solid var(--border-line);
            background: var(--surface-card); color: var(--text-main); font-weight: 600; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
            text-decoration: none;
        }
        .glass-btn:hover { background: var(--surface-hover); transform: translateY(-2px); }

        /* ==========================================================================
         * 3. STANDALONE MODAL ENGINE (PamphletCard)
         * ========================================================================== */
        .m-backdrop { position: fixed; inset: 0; background: rgba(5,5,7,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: mFade 0.2s; padding: 16px; text-align: left; }
        .m-panel { background: var(--surface-base); border: 1px solid var(--border-line); border-radius: 24px; padding: 26px; max-width: 480px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.9); animation: mPop 0.2s; max-height: 90vh; overflow-y: auto; }
        .m-head { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .m-body { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 24px; }
        .m-body a { color: var(--violet-glow); text-decoration: none; font-weight: 600; }
        .m-body a:hover { text-decoration: underline; }
        .m-foot { display: flex; gap: 10px; justify-content: flex-end; }
        .m-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border-line); background: var(--surface-card); color: var(--text-main); font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .m-btn.accent { background: var(--violet-glow); border-color: var(--violet-glow); color: var(--void-black); font-weight: 700; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.25); }
        .m-btn:hover { background: var(--surface-hover); }
        .m-btn.accent:hover { background: var(--text-main); }

        /* Animations */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes mFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes mPop { from { transform: scale(0.95) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* Mobile Adjustment */
        @media (max-width: 540px) {
            .embed-wrapper iframe { height: 600px; /* Scaled down for mobile viewports */ }
        }

    <div class="embed-wrapper">

            <div class="spinner"></div>
            <span id="loader-text">Establishing secure connection to LinkedIn...</span>
        </div>
        
        <iframe id="li-iframe" src="https://www.linkedin.com/embed/feed/update/urn:li:ugcPost:7475848939955728384" height="1507" width="504" frameborder="0" allowfullscreen="" title="Embedded post"></iframe>
    </div>

    <div class="actions">
        <button class="glass-btn" onclick="smartReturn()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Go Back
        </button>
        <button class="glass-btn" onclick="triggerTestError()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            Test Modal Override
        </button>
    </div>

    <script>
        /* ==========================================================================
         * 1. MODAL ENGINE (PamphletCard)
         * ========================================================================== */
        class PamphletCard {
            static create({ title, body, buttons }) {
                return new Promise(resolve => {
                    const ov = document.createElement('div'); ov.className = 'm-backdrop';
                    ov.innerHTML = `<div class="m-panel" onclick="event.stopPropagation()"><div class="m-head">${title}</div><div class="m-body">${body}</div><div class="m-foot">${buttons}</div></div>`;
                    document.body.appendChild(ov);
                    const exit = v => { ov.remove(); resolve(v); };
                    ov.onclick = () => exit(null);
                    ov.querySelectorAll('[data-ret]').forEach(b => b.onclick = () => exit(b.getAttribute('data-ret') === 'null' ? null : b.getAttribute('data-ret')));
                });
            }

            static alert(title, msg) { 
                return this.create({ 
                    title: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--rose-alert)" stroke-width="2" style="margin-right:8px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><span>${title}</span>`, 
                    body: msg, 
                    buttons: `<button class="m-btn accent" data-ret="ok">Understood</button>` 
                }); 
            }

            static confirm(title, msg) { 
                return this.create({ 
                    title: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--violet-glow)" stroke-width="2" style="margin-right:8px;"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg><span>${title}</span>`, 
                    body: msg, 
                    buttons: `<button class="m-btn" data-ret="null">Cancel</button><button class="m-btn accent" data-ret="yes">Proceed</button>` 
                }); 
            }
        }

        /* ==========================================================================
         * 2. IFRAME LOAD VALIDATION & TIMEOUT LOGIC
         * ========================================================================== */
        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('li-iframe');
            const loader = document.getElementById('embed-loader');
            const loaderText = document.getElementById('loader-text');
            
            let isIframeLoaded = false;

            // Listen for iframe native load event
            iframe.onload = () => {
                isIframeLoaded = true;
                loader.style.display = 'none';
            };

            // Failsafe Timeout: If LinkedIn is blocked by Privacy Shields or Adblockers
            setTimeout(() => {
                if (!isIframeLoaded) {
                    loader.querySelector('.spinner').style.display = 'none';
                    loaderText.innerHTML = '<span style="color:var(--rose-alert); font-weight:700;">Embed Blocked by Browser Security</span>';
                    
                    PamphletCard.alert(
                        "External Embed Suppressed",
                        "The LinkedIn iframe is taking unusually long to respond. This usually happens if you are using <b>Strict Tracking Protection</b> (like Brave/Firefox) or an aggressive Ad-Blocker.<br><br>You can bypass this by viewing the post directly on LinkedIn: <br><br><a href='https://www.linkedin.com/feed/update/urn:li:ugcPost:7475848939955728384' target='_blank'>↗ Open Post in New Tab</a>"
                    );
                }
            }, 7000); // 7-second grace period
        });

        // Debug trigger for testing the modal manually
        function triggerTestError() {
            PamphletCard.confirm(
                "Manual Override Prompt", 
                "Are you sure you want to test the standalone modal architecture? If you click proceed, the system will output a simulated log."
            ).then(res => {
                if (res === 'yes') {
                    PamphletCard.alert("Diagnostic Success", "The PamphletCard dynamic DOM generation is functioning flawlessly.");
                }
            });
        }

        // Smart Return Exception Handler
        function smartReturn() {
            // If history length is greater than 1 (or 2 depending on browser quirks),
            // it means they navigated here from another page.
            if (window.history.length > 1 && document.referrer.includes('akshat-881236.github.io')) {
                window.history.back();
            } else {
                // If they opened the link directly, or came from an external site,
                // forcefully route them to the NovaPlay root directory.
                window.location.href = 'index.html';
            }
        }
    </script>
